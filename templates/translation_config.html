<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; padding-top: 70px; overflow-y: auto; padding-bottom: 20px; }
        .footer { width: 100%; line-height: 1.5; background-color: #f5f5f5; text-align: center; flex-shrink: 0; padding: 10px 0; }
        .page-shell { flex-grow: 1; }
        .upgrade-nav-link { color: #fff !important; font-weight: 700; }
        .upgrade-nav-link:hover { color: #fff !important; text-decoration: underline; }
        .upgrade-float-window {
            position: fixed;
            top: 74px;
            right: 20px;
            width: min(720px, calc(100vw - 40px));
            z-index: 1060;
        }
        .upgrade-float-window .card { border: 1px solid rgba(0, 0, 0, 0.15); }
        .upgrade-log-box {
            height: 420px;
            max-height: 60vh;
            overflow: auto;
            background: #0f172a;
            color: #e5e7eb;
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .upgrade-float-window {
                top: 66px;
                right: 10px;
                left: 10px;
                width: auto;
            }
            .upgrade-log-box { height: 300px; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="/">TruthSocial Monitor</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item {{if eq .ActivePage "config"}}active{{end}}"><a class="nav-link" href="/">配置</a></li>
            <li class="nav-item {{if eq .ActivePage "ai"}}active{{end}}"><a class="nav-link" href="/ai_config">AI 配置</a></li>
            <li class="nav-item {{if eq .ActivePage "translation"}}active{{end}}"><a class="nav-link" href="/translation_config">翻译设置</a></li>
            <li class="nav-item {{if eq .ActivePage "message"}}active{{end}}"><a class="nav-link" href="/message_push">消息推送</a></li>
            <li class="nav-item {{if eq .ActivePage "content"}}active{{end}}"><a class="nav-link" href="/content">内容</a></li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link upgrade-nav-link" href="#" id="upgradeButton">升级</a>
            </li>
        </ul>
    </div>
</nav>

<div id="upgradeFloatingWindow" class="upgrade-float-window d-none">
    <div class="card shadow-lg">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>升级日志</strong>
            <button type="button" class="close" aria-label="Close" id="closeUpgradeWindow">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div class="card-body">
            <div id="upgradeStatusText" class="text-muted mb-2">等待升级任务启动。</div>
            <div id="upgradeLogContent" class="upgrade-log-box">点击“升级”后，这里会显示升级脚本的实时日志。</div>
        </div>
    </div>
</div>

<main role="main" class="container page-shell">
    <h1 class="mt-5">翻译设置</h1>
    {{if .Message}}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{.Message}}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>
    {{end}}
    <form method="POST" action="/translation_config/save">
        <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="translation_enabled" name="translation_enabled" {{if .Config.Translation.Enabled}}checked{{end}}>
            <label class="form-check-label" for="translation_enabled">启用翻译</label>
        </div>
        <div class="form-group">
            <label for="translation_api_url">翻译 API URL:</label>
            <input type="text" class="form-control" id="translation_api_url" name="translation_api_url" value="{{.Config.Translation.APIURL}}">
        </div>
        <div class="form-group">
            <label for="translation_api_key">翻译 API Key:</label>
            <input type="password" class="form-control" id="translation_api_key" name="translation_api_key" value="{{.TranslationAPIKeyValue}}">
        </div>
        <div class="form-group">
            <label for="translation_model">模型名称:</label>
            <input type="text" class="form-control" id="translation_model" name="translation_model" value="{{.Config.Translation.Model}}">
        </div>
        <div class="form-group">
            <label for="translation_source_language">源语言:</label>
            <input type="text" class="form-control" id="translation_source_language" name="translation_source_language" value="{{.Config.Translation.SourceLanguage}}">
        </div>
        <div class="form-group">
            <label for="translation_target_language">目标语言:</label>
            <input type="text" class="form-control" id="translation_target_language" name="translation_target_language" value="{{.Config.Translation.TargetLanguage}}">
        </div>
        <div class="form-group">
            <label for="translation_timeout_seconds">请求超时（秒）:</label>
            <input type="number" class="form-control" id="translation_timeout_seconds" name="translation_timeout_seconds" min="1" value="{{.Config.Translation.TimeoutSeconds}}">
        </div>
        <div class="form-group">
            <label for="translation_prompt">翻译提示词:</label>
            <textarea class="form-control" id="translation_prompt" name="translation_prompt" rows="3">{{.Config.Translation.Prompt}}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">保存翻译设置</button>
    </form>
</main>

<footer class="footer">
    <div class="container">
        <span class="text-muted">Code by Yuhao@jiansutech.com - {{.Git.Time}} - {{.Git.Hash}} - {{.Git.Branch}}</span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
    $(document).ready(function() {
        var upgradePollTimer = null;

        function setUpgradeStatus(message, type) {
            var $status = $('#upgradeStatusText');
            $status.removeClass('text-muted text-info text-success text-warning text-danger');
            $status.addClass(type ? 'text-' + type : 'text-muted');
            $status.text(message || '');
        }

        function setUpgradeLog(message) {
            var $log = $('#upgradeLogContent');
            $log.text(message || '等待升级日志...');
            $log.scrollTop($log[0].scrollHeight);
        }

        function showUpgradeWindow() {
            $('#upgradeFloatingWindow').removeClass('d-none');
        }

        function stopUpgradePolling() {
            if (upgradePollTimer) {
                clearInterval(upgradePollTimer);
                upgradePollTimer = null;
            }
        }

        function pollUpgradeLog() {
            $.ajax({
                url: '/upgrade/log',
                type: 'GET',
                cache: false,
                success: function(response) {
                    showUpgradeWindow();
                    if (response.status === 'running') {
                        setUpgradeStatus('升级正在执行，请稍候。', 'warning');
                    } else if (response.status === 'finished') {
                        setUpgradeStatus('升级已完成。', 'success');
                    } else {
                        setUpgradeStatus('等待升级任务。', 'info');
                    }
                    setUpgradeLog(response.log || '暂无升级日志，等待脚本输出...');
                    if (response.finished) {
                        stopUpgradePolling();
                    }
                },
                error: function(xhr) {
                    var errorMsg = xhr.responseJSON ? xhr.responseJSON.message : '读取升级日志失败。';
                    setUpgradeStatus(errorMsg, 'danger');
                    setUpgradeLog(errorMsg);
                    stopUpgradePolling();
                }
            });
        }

        function startUpgradePolling() {
            stopUpgradePolling();
            pollUpgradeLog();
            upgradePollTimer = setInterval(pollUpgradeLog, 1000);
        }

        function startUpgradeFlow($button, originalText) {
            showUpgradeWindow();
            setUpgradeStatus('正在启动升级任务...', 'info');
            setUpgradeLog('正在启动升级任务，请稍候...');
            $.ajax({
                url: '/upgrade',
                type: 'POST',
                success: function(response) {
                    setUpgradeStatus(response.message || '升级任务已启动。', 'warning');
                    startUpgradePolling();
                },
                error: function(xhr) {
                    var errorMsg = xhr.responseJSON ? xhr.responseJSON.message : '升级启动失败。';
                    setUpgradeStatus(errorMsg, 'danger');
                    setUpgradeLog(errorMsg);
                    stopUpgradePolling();
                },
                complete: function() {
                    if ($button && originalText) {
                        $button.removeClass('disabled').text(originalText);
                    }
                }
            });
        }

        $('#upgradeButton').on('click', function(e) {
            e.preventDefault();
            var $button = $(this);
            var originalText = $button.text();
            $button.addClass('disabled').text('升级中...');
            startUpgradeFlow($button, originalText);
        });

        $('#closeUpgradeWindow').on('click', function() {
            stopUpgradePolling();
            $('#upgradeFloatingWindow').addClass('d-none');
        });
    });
</script>
</body>
</html>
