<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; padding-top: 70px; overflow-y: auto; padding-bottom: 20px; }
        .footer { width: 100%; line-height: 1.5; background-color: #f5f5f5; text-align: center; flex-shrink: 0; padding: 10px 0; }
        .page-shell { flex-grow: 1; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="/">TruthSocial Monitor</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item {{if eq .ActivePage "config"}}active{{end}}"><a class="nav-link" href="/">配置</a></li>
            <li class="nav-item {{if eq .ActivePage "ai"}}active{{end}}"><a class="nav-link" href="/ai_config">AI 配置</a></li>
            <li class="nav-item {{if eq .ActivePage "message"}}active{{end}}"><a class="nav-link" href="/message_push">消息推送</a></li>
            <li class="nav-item {{if eq .ActivePage "content"}}active{{end}}"><a class="nav-link" href="/content">内容</a></li>
        </ul>
    </div>
</nav>

<main role="main" class="container page-shell">
    <h1 class="mt-5">AI 配置</h1>
    <form method="POST" action="/ai_config/save">
        <fieldset class="form-group border p-3 mb-3">
            <legend class="w-auto px-2">AI 分析设置</legend>
            <div class="form-group form-check">
                <input type="checkbox" class="form-check-input" id="ai_enabled" name="ai_enabled" {{if .Config.AIAnalysis.Enabled}}checked{{end}}>
                <label class="form-check-label" for="ai_enabled">启用 AI 分析</label>
            </div>
            <div class="form-group">
                <label for="ai_api_key">AI API Key:</label>
                <input type="password" class="form-control" id="ai_api_key" name="ai_api_key" value="{{.AIApiKeyValue}}">
            </div>
            <div class="form-group">
                <label for="ai_prompt">AI 分析提示词:</label>
                <textarea class="form-control" id="ai_prompt" name="ai_prompt" rows="3">{{.Config.AIAnalysis.Prompt}}</textarea>
            </div>
        </fieldset>
        <button type="submit" class="btn btn-primary">保存 AI 配置</button>
    </form>
</main>

<footer class="footer">
    <div class="container">
        <span class="text-muted">Code by Yuhao@jiansutech.com - {{.Git.Time}} - {{.Git.Hash}} - {{.Git.Branch}}</span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
