<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; padding-top: 70px; overflow-y: auto; padding-bottom: 20px; }
        .footer { width: 100%; line-height: 1.5; background-color: #f5f5f5; text-align: center; flex-shrink: 0; padding: 10px 0; }
        .page-shell { flex-grow: 1; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="/">TruthSocial Monitor</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item {{if eq .ActivePage "config"}}active{{end}}"><a class="nav-link" href="/">配置</a></li>
            <li class="nav-item {{if eq .ActivePage "ai"}}active{{end}}"><a class="nav-link" href="/ai_config">AI 配置</a></li>
            <li class="nav-item {{if eq .ActivePage "message"}}active{{end}}"><a class="nav-link" href="/message_push">消息推送</a></li>
            <li class="nav-item {{if eq .ActivePage "content"}}active{{end}}"><a class="nav-link" href="/content">内容</a></li>
        </ul>
    </div>
</nav>

<main role="main" class="container page-shell">
    {{if .Message}}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{.Message}}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>
    {{end}}
    <h1 class="mt-5">配置</h1>
    <form method="POST" action="/save_config">
        <div class="form-group">
            <label for="bearer_token">Bearer Token:</label>
            <input type="text" class="form-control" id="bearer_token" name="bearer_token" value="{{.BearerTokenValue}}">
            <small class="form-text text-muted">从 `get_token.py` 获取的认证令牌。</small>
        </div>
        <div class="form-group">
            <label for="truthsocial_username">Truth Social 用户名:</label>
            <input type="text" class="form-control" id="truthsocial_username" name="truthsocial_username" value="{{.Config.Auth.TruthSocialUsername}}">
            <small class="form-text text-muted">您在 Truth Social 上的用户名，例如 'pcdogyuhao'。</small>
        </div>
        <div class="form-group">
            <label for="refresh_interval">刷新间隔:</label>
            <input type="text" class="form-control" id="refresh_interval" name="refresh_interval" value="{{.Config.RefreshInterval}}">
            <small class="form-text text-muted">例如: 5m (5分钟), 1h (1小时)。</small>
        </div>
        <div class="form-group">
            <label for="accounts_to_monitor">监控账户 (每行一个用户名或 URL):</label>
            <textarea class="form-control" id="accounts_to_monitor" name="accounts_to_monitor" rows="5">{{.AccountsText}}</textarea>
            <small class="form-text text-muted">要监控的 Truth Social 用户名或完整主页 URL，每行一个。</small>
        </div>
        <button type="submit" class="btn btn-primary">保存配置</button>
    </form>
</main>

<footer class="footer">
    <div class="container">
        <span class="text-muted">Code by Yuhao@jiansutech.com - {{.Git.Time}} - {{.Git.Hash}} - {{.Git.Branch}}</span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
