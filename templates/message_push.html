<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; padding-top: 70px; overflow-y: auto; padding-bottom: 20px; }
        .footer { width: 100%; line-height: 1.5; background-color: #f5f5f5; text-align: center; flex-shrink: 0; padding: 10px 0; }
        .page-shell { flex-grow: 1; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="/">TruthSocial Monitor</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item {{if eq .ActivePage "config"}}active{{end}}"><a class="nav-link" href="/">配置</a></li>
            <li class="nav-item {{if eq .ActivePage "ai"}}active{{end}}"><a class="nav-link" href="/ai_config">AI 配置</a></li>
            <li class="nav-item {{if eq .ActivePage "message"}}active{{end}}"><a class="nav-link" href="/message_push">消息推送</a></li>
            <li class="nav-item {{if eq .ActivePage "content"}}active{{end}}"><a class="nav-link" href="/content">内容</a></li>
        </ul>
    </div>
</nav>

<main role="main" class="container page-shell">
    <h1 class="mt-5">消息推送配置</h1>
    <div class="alert alert-info" role="alert">
        <p>在此配置 Telegram 机器人，用于接收新帖子通知。</p>
    </div>
    <form id="telegramConfigForm" class="mt-4">
        <div class="form-group">
            <label for="botToken">Telegram Bot Token</label>
            <div class="input-group mb-3">
                <input type="password" class="form-control" id="botToken" name="bot_token" value="{{.BotToken}}" placeholder="请输入您的 Telegram Bot Token" required>
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary copy-to-clipboard" type="button" data-target="botToken">复制</button>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label for="chatId">Telegram Chat ID</label>
            <div class="input-group mb-3">
                <input type="password" class="form-control" id="chatId" name="chat_id" value="{{.ChatID}}" placeholder="请输入您希望接收消息的 Chat ID" required>
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary copy-to-clipboard" type="button" data-target="chatId">复制</button>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">保存配置</button>
    </form>
    <div id="messageArea" class="mt-3"></div>
</main>

<footer class="footer">
    <div class="container">
        <span class="text-muted">Code by Yuhao@jiansutech.com - {{.Git.Time}} - {{.Git.Hash}} - {{.Git.Branch}}</span>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
    $(document).ready(function() {
        $('.copy-to-clipboard').on('click', function() {
            var targetId = $(this).data('target');
            var $input = $('#' + targetId);
            var fullValue = $input.val();
            if (!fullValue) {
                displaySyncMessage('没有内容可复制。', 'warning');
                return;
            }

            var $tempInput = $('<textarea>');
            $('body').append($tempInput);
            $tempInput.val(fullValue).select();
            document.execCommand('copy');
            $tempInput.remove();

            var originalButtonText = $(this).text();
            var $button = $(this);
            $button.text('已复制!').prop('disabled', true);
            setTimeout(function() {
                $button.text(originalButtonText).prop('disabled', false);
            }, 1500);
            displaySyncMessage('已复制到剪贴板。', 'success');
        });

        function displaySyncMessage(message, type = 'info') {
            var alertClass = 'alert-' + type;
            var messageHtml = '<div class="alert ' + alertClass + ' alert-dismissible fade show" role="alert">' +
                message +
                '<button type="button" class="close" data-dismiss="alert" aria-label="Close">' +
                '<span aria-hidden="true">&times;</span>' +
                '</button>' +
                '</div>';
            $('#messageArea').html(messageHtml);
            setTimeout(function() {
                $('#messageArea .alert').alert('close');
            }, 3000);
        }

        $('#telegramConfigForm').on('submit', function(e) {
            e.preventDefault();
            var $submitButton = $(this).find('button[type="submit"]');
            $submitButton.prop('disabled', true).text('保存中...');
            $('#messageArea').empty();
            $.ajax({
                url: '/message_push/save',
                type: 'POST',
                data: { bot_token: $('#botToken').val(), chat_id: $('#chatId').val() },
                success: function(response) {
                    displaySyncMessage(response.message, 'success');
                },
                error: function(xhr) {
                    var errorMsg = xhr.responseJSON ? xhr.responseJSON.message : "保存失败，请检查服务器日志。";
                    displaySyncMessage(errorMsg, 'danger');
                },
                complete: function() {
                    $submitButton.prop('disabled', false).text('保存配置');
                }
            });
        });
    });
</script>
</body>
</html>
